<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monkey Mash</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; }

      #ui {
        position: fixed;
        top: 0; left: 0; right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        gap: 40px;
        pointer-events: none;
        font-family: 'Arial Black', sans-serif;
        color: #fff;
        text-shadow: 2px 2px 4px #000;
      }

      .score-box {
        text-align: center;
      }

      .score-box .team {
        font-size: 14px;
        opacity: 0.8;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .score-box .score {
        font-size: 64px;
        line-height: 1;
      }

      #divider {
        font-size: 48px;
        opacity: 0.5;
      }

      #message {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Arial Black', sans-serif;
        font-size: 48px;
        color: #fff;
        text-shadow: 3px 3px 6px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
      }

      #controls {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: rgba(255,255,255,0.5);
        text-align: center;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="ui" style="display:none;">
      <div class="score-box">
        <div class="team">You</div>
        <div class="score" id="score-left">0</div>
      </div>
      <div id="divider">:</div>
      <div class="score-box">
        <div class="team">Opponent</div>
        <div class="score" id="score-right">0</div>
      </div>
    </div>

    <div id="message"></div>

    <div id="controls" style="display:none;">
      WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Space (in air) — Spike &nbsp;|&nbsp; A/D while spiking — Curve ball
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
